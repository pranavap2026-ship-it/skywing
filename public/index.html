<!DOCTYPE html>
<html lang="en">

<head>

  <!-- ===============================
  META
  ================================ -->
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <meta
    http-equiv="X-UA-Compatible"
    content="IE=edge"
  />

  <!-- ===============================
  SEO
  ================================ -->
  <title>
    SkyWing Media Team | College of Engineering Poonjar
  </title>

  <meta
    name="description"
    content="Official media team of College of Engineering Poonjar. Photography, videography, event coverage, creative design and storytelling."
  />

  <meta
    name="keywords"
    content="SkyWing, SkyWing CEP, College of Engineering Poonjar, media team, photography, videography, college events, CEP media team"
  />

  <meta
    name="author"
    content="SkyWing Media Team"
  />

  <meta
    name="robots"
    content="index, follow"
  />

  <!-- ===============================
  OPEN GRAPH
  ================================ -->
  <meta
    property="og:title"
    content="SkyWing Media Team"
  />

  <meta
    property="og:description"
    content="Official media team of College of Engineering Poonjar."
  />

  <meta
    property="og:type"
    content="website"
  />

  <meta
    property="og:url"
    content="https://your-vercel-domain.vercel.app"
  />

  <meta
    property="og:image"
    content="/logo192.png"
  />

  <!-- ===============================
  TWITTER
  ================================ -->
  <meta
    name="twitter:card"
    content="summary_large_image"
  />

  <meta
    name="twitter:title"
    content="SkyWing Media Team"
  />

  <meta
    name="twitter:description"
    content="Official media team of College of Engineering Poonjar."
  />

  <!-- ===============================
  FAVICON
  ================================ -->
  <link
    rel="icon"
    href="%PUBLIC_URL%/favicon.ico"
  />

  <link
    rel="apple-touch-icon"
    href="%PUBLIC_URL%/logo192.png"
  />

  <!-- ===============================
  GOOGLE FONTS
  ================================ -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet"
  />

  <!-- ===============================
  THEME COLOR
  ================================ -->
  <meta
    name="theme-color"
    content="#00aaff"
  />

</head>

<body>

  <noscript>
    You need to enable JavaScript
    to run this app.
  </noscript>

  <div id="root"></div>

</body>

</html>
